<!DOCTYPE html>
<html>
<head>
    <title>Employee Survey</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            background-color: #eaf4f9;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .top-section{
            background-color: #dcecf3;
            padding: 30px;
            text-align: center;
        }

        .top-section h1{
            color: #0d47a1;
            margin-bottom: 10px;
        }

        .top-section h3{
            color: #333;
            font-weight: normal;
        }

        .survey-form{
            width: 70%;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
        }

        .question{
            margin-bottom: 50px;
            text-align: left;
        }

        .question p{
            font-size: 26px;
            margin-bottom: 30px;
            color: #222;
        }

        .option{
            display: block;
            margin-bottom: 25px;
            font-size: 16px;
            color: #333;
        }

        .option input{
            margin-right: 15px;
            transform: scale(1.3);
        }

        button{
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background-color: #1565c0;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0d47a1;
        }

    </style>

</head>

<body>

    <div class="top-section">

        <h1>Employee Survey</h1>

        <h3>Hey  {{ name }}</h3>

    </div>

    <form class="survey-form" action="/submit" method="post">

        <input type="hidden" name="username" value="{{ name }}">
        <input type="hidden" name="email" value="{{ email }}">

        <!-- QUESTION 1 -->

        <div class="question">

            <p>1. How satisfied are you with your job?</p>

            <label class="option">
                <input type="radio" name="q1" value="5" required>
                Very Satisfied
            </label>

            <label class="option">
                <input type="radio" name="q1" value="4">
                Satisfied
            </label>

            <label class="option">
                <input type="radio" name="q1" value="3">
                Neutral
            </label>

            <label class="option">
                <input type="radio" name="q1" value="2">
                Dissatisfied
            </label>

            <label class="option">
                <input type="radio" name="q1" value="1">
                Very Dissatisfied
            </label>

        </div>

        <!-- QUESTION 2 -->

        <div class="question">

            <p>2. How is your work environment?</p>

            <label class="option">
                <input type="radio" name="q2" value="5" required>
                Excellent
            </label>

            <label class="option">
                <input type="radio" name="q2" value="4">
                Good
            </label>

            <label class="option">
                <input type="radio" name="q2" value="3">
                Average
            </label>

            <label class="option">
                <input type="radio" name="q2" value="2">
                Poor
            </label>

            <label class="option">
                <input type="radio" name="q2" value="1">
                Very Poor
            </label>

        </div>

        <!-- QUESTION 3 -->

        <div class="question">

            <p>3. How supportive is your team?</p>

            <label class="option">
                <input type="radio" name="q3" value="5" required>
                Very Supportive
            </label>

            <label class="option">
                <input type="radio" name="q3" value="4">
                Supportive
            </label>

            <label class="option">
                <input type="radio" name="q3" value="3">
                Neutral
            </label>

            <label class="option">
                <input type="radio" name="q3" value="2">
                Unsupportive
            </label>

            <label class="option">
                <input type="radio" name="q3" value="1">
                Very Unsupportive
            </label>

        </div>

        <!-- QUESTION 4 -->

        <div class="question">

            <p>4. Is your workload manageable?</p>

            <label class="option">
                <input type="radio" name="q4" value="5" required>
                Easy
            </label>

            <label class="option">
                <input type="radio" name="q4" value="4">
                Manageable
            </label>

            <label class="option">
                <input type="radio" name="q4" value="3">
                Moderate
            </label>

            <label class="option">
                <input type="radio" name="q4" value="2">
                Heavy
            </label>

            <label class="option">
                <input type="radio" name="q4" value="1">
                Overloaded
            </label>

        </div>

        <!-- QUESTION 5 -->

        <div class="question">

            <p>5. Do you have growth opportunities?</p>

            <label class="option">
                <input type="radio" name="q5" value="5" required>
                Excellent
            </label>

            <label class="option">
                <input type="radio" name="q5" value="4">
                Good
            </label>

            <label class="option">
                <input type="radio" name="q5" value="3">
                Average
            </label>

            <label class="option">
                <input type="radio" name="q5" value="2">
                Limited
            </label>

            <label class="option">
                <input type="radio" name="q5" value="1">
                No Growth
            </label>

        </div>

        <button type="submit">
            Submit Survey
        </button>

    </form>

</body>
</html>
