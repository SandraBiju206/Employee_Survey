<!DOCTYPE html>
<html>
<head>

    <title>Employee Suvey</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <h2> Welcome to Employee Survey</h2>

    <h3 style="color:red;">
        {{ message }}
    </h3>

    <form action="/check_login" method="post">

        <label>Name :</label>

        <input
        type="text"
        name="username"
        placeholder="Enter Name"
        required>

        <br>

        <label>Email :</label>

        <input
        type="email"
        name="email"
        placeholder="Enter Email"
        required>

        <br><br>

        <button type="submit">
            Submit
        </button>

        <div style="margin-top:20px;">

            <a href="/admin">
                Login as Admin →
            </a>

        </div>

    </form>

</body>
</html>
